<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Budget Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 30px 20px; }
        h1 { text-align: center; color: white; font-size: 2rem; font-weight: 700; margin-bottom: 10px; }
        .subtitle { text-align: center; color: rgba(255,255,255,0.8); margin-bottom: 30px; font-size: 0.9rem; }
        .container { max-width: 650px; margin: auto; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .stat-card .number { font-size: 1.6rem; font-weight: 700; }
        .stat-card .label { font-size: 0.75rem; opacity: 0.8; margin-top: 4px; }
        .form-box { background: white; padding: 25px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .form-box h2 { color: #333; margin-bottom: 15px; font-size: 1.1rem; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        input, select { width: 100%; padding: 12px 15px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; font-family: 'Poppins', sans-serif; outline: none; transition: border 0.3s; }
        input:focus, select:focus { border-color: #18acac; }
        button { width: 100%; padding: 13px; background: linear-gradient(135deg, #96a5e9, #9fa24b); color: white; border: none; border-radius: 10px; font-size: 15px; font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer; transition: opacity 0.3s; }
        button:hover { opacity: 0.9; }
        .expense-item { background: white; padding: 15px 20px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .exp-left { display: flex; align-items: center; gap: 12px; }
        .exp-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .exp-title { font-weight: 600; color: #333; font-size: 0.95rem; }
        .exp-category { font-size: 0.75rem; color: #999; margin-top: 2px; }
        .exp-right { display: flex; align-items: center; gap: 12px; }
        .exp-amount { font-weight: 700; color: #e676f4; font-size: 1rem; }
        .delete-btn { width: auto; padding: 6px 14px; background: #fff0f0; color: #e74c3c; border: 1px solid #ffd0d0; font-size: 12px; border-radius: 8px; font-weight: 500; cursor: pointer; }
        .delete-btn:hover { background: #e7491e; color: white; }
        .chart-box { background: white; padding: 25px; border-radius: 20px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: none; }
        .chart-box h3 { color: #333; margin-bottom: 15px; font-size: 1rem; }
        .empty-state { text-align: center; color: rgba(255,255,255,0.7); padding: 30px; font-size: 0.95rem; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border-radius: 20px; padding: 30px; max-width: 320px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: popIn 0.3s ease; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-icon { font-size: 2.5rem; margin-bottom: 15px; }
        .modal-title { font-size: 1.1rem; font-weight: 600; color: #333; margin-bottom: 8px; }
        .modal-message { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
        .modal-close { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; }
        .modal-close.error { background: #fff0f0; color: #e74c3c; }
        .modal-close.success { background: #f0fff4; color: #2ecc71; }
    </style>
</head>
<body>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-icon" id="modalIcon"></div>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-message" id="modalMessage"></div>
            <button class="modal-close" id="modalClose" onclick="closeModal()">Close</button>
        </div>
    </div>

    <div class="container">
        <h1>💰 Smart Budget Tracker</h1>
        <p class="subtitle">Track your daily expenses smartly</p>

        <div class="stats">
            <div class="stat-card"><div class="number" id="totalAmount">₹0</div><div class="label">Total Spent</div></div>
            <div class="stat-card"><div class="number" id="totalCount">0</div><div class="label">Expenses</div></div>
            <div class="stat-card"><div class="number" id="avgAmount">₹0</div><div class="label">Average</div></div>
        </div>

        <div class="form-box">
            <h2>➕ Add New Expense</h2>
            <div class="input-group">
                <input type="text" id="expTitle" placeholder="Expense Title" />
                <input type="number" id="expAmount" placeholder="Amount (₹)" />
            </div>
            <select id="expCategory" style="margin-bottom: 12px;">
                <option value="">Select Category</option>
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Shopping">Shopping</option>
                <option value="Bills">Bills</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Health">Health</option>
                <option value="Education">Education</option>
                <option value="Rent">Rent</option>
                <option value="Other">Other</option>
            </select>
            <button onclick="addExpense()">+ Add Expense</button>
        </div>

        <div id="expenseList"></div>

        <div class="chart-box" id="chartBox">
            <h3>📊 Category Wise Spending</h3>
            <canvas id="expenseChart"></canvas>
        </div>
    </div>

    <script>
        const API = '/api/expenses';
        const categoryColors = {
            'Food': '#FF6B6B', 'Travel': '#4ECDC4', 'Shopping': '#45B7D1',
            'Bills': '#FFA07A', 'Entertainment': '#98D8C8', 'Health': '#F7DC6F',
            'Education': '#BB8FCE', 'Rent': '#85C1E9', 'Other': '#AAB7B8'
        };

        function showModal(type, title, message) {
            document.getElementById('modalIcon').textContent = type === 'success' ? '✅' : '❌';
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('modalClose').className = `modal-close ${type}`;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        async function loadExpenses() {
            const res = await fetch(API);
            const data = await res.json();
            const list = document.getElementById('expenseList');
            list.innerHTML = '';

            if (data.length === 0) {
                list.innerHTML = '<div class="empty-state">No expenses yet! Add your first expense above 👆</div>';
                document.getElementById('totalAmount').textContent = '₹0';
                document.getElementById('totalCount').textContent = '0';
                document.getElementById('avgAmount').textContent = '₹0';
                document.getElementById('chartBox').style.display = 'none';
                return;
            }

            let sum = 0;
            const categories = {};
            data.forEach(exp => {
                sum += exp.amount;
                const cat = exp.category || 'Other';
                categories[cat] = (categories[cat] || 0) + exp.amount;
                const color = categoryColors[exp.category] || '#AAB7B8';
                list.innerHTML += `
                    <div class="expense-item">
                        <div class="exp-left">
                            <div class="exp-icon" style="background:${color}22">💰</div>
                            <div>
                                <div class="exp-title">${exp.title}</div>
                                <div class="exp-category">${exp.category || 'Other'}</div>
                            </div>
                        </div>
                        <div class="exp-right">
                            <span class="exp-amount">₹${exp.amount}</span>
                            <button class="delete-btn" onclick="deleteExpense(${exp.id})">Delete</button>
                        </div>
                    </div>`;
            });

            document.getElementById('totalAmount').textContent = '₹' + sum;
            document.getElementById('totalCount').textContent = data.length;
            document.getElementById('avgAmount').textContent = '₹' + Math.round(sum / data.length);

            document.getElementById('chartBox').style.display = 'block';
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(categories),
                    datasets: [{ data: Object.values(categories), backgroundColor: Object.values(categoryColors) }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        }

        async function addExpense() {
            const title = document.getElementById('expTitle').value.trim();
            const amount = document.getElementById('expAmount').value;
            const category = document.getElementById('expCategory').value;

            if (!title) { showModal('error', 'Title Missing!', 'Please enter expense title.'); return; }
            if (!amount || amount <= 0) { showModal('error', 'Amount Missing!', 'Please enter a valid amount.'); return; }
            if (!category) { showModal('error', 'Category Missing!', 'Please select a category.'); return; }

            await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, amount: parseFloat(amount), category })
            });

            document.getElementById('expTitle').value = '';
            document.getElementById('expAmount').value = '';
            document.getElementById('expCategory').value = '';
            showModal('success', 'Success!', 'Expense added successfully!');
            loadExpenses();
        }

        async function deleteExpense(id) {
            await fetch(`${API}/${id}`, { method: 'DELETE' });
            showModal('success', 'Deleted!', 'Expense deleted successfully!');
            loadExpenses();
        }

        loadExpenses();
    </script>
</body>
</html>
